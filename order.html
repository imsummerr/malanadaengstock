<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ใบสั่งของ — หม่าล่าหน้าแดง</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .input-field:focus { outline:none; border-color:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,0.1); }
    .spinner { border:3px solid #f3f3f3; border-top:3px solid #ef4444; border-radius:50%; width:24px; height:24px; animation:spin 0.8s linear infinite; display:inline-block; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .item-row { transition: background 0.15s; }
    .item-row:hover { background: #f9fafb; }
    .item-fields { display:none; }
    .item-fields.open { display:grid; }

    #login-page {
      min-height: 100vh; display:flex; align-items:center; justify-content:center;

    .login-input { width:100%; padding:0.875rem 1rem; border:2px solid #e5e7eb; border-radius:0.75rem;

    .login-input:focus { outline:none; border-color:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,0.1); }
    .login-btn { width:100%; padding:0.875rem; background:linear-gradient(135deg,#ef4444,#dc2626); color:white;
      border:none; border-radius:0.75rem; font-size:1rem; font-weight:600; font-family:'Sarabun',sans-serif;
      cursor:pointer; transition:all 0.2s; box-shadow:0 4px 12px rgba(239,68,68,0.4); }
    .login-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 20px rgba(239,68,68,0.45); }
    .login-btn:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
    .login-spinner { border:2px solid rgba(255,255,255,0.3); border-top:2px solid white; border-radius:50%;
      width:18px; height:18px; animation:spin 0.8s linear infinite; display:inline-block; vertical-align:middle; margin-right:6px; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-red-50 via-orange-50 to-yellow-50">

<!-- ===== หน้า Login ===== -->
<div id="login-page">
  <div class="login-card fade-in">

      <div style="width:72px; height:72px; background:linear-gradient(135deg,#ef4444,#dc2626); border-radius:1.25rem; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; box-shadow:0 8px 24px rgba(239,68,68,0.35);">
        <span style="font-size:2rem;">🧾</span>
      </div>
      <h1 style="font-size:1.4rem; font-weight:700; color:#1f2937; margin:0 0 0.25rem;">ใบสั่งของ</h1>
      <p style="font-size:0.875rem; color:#9ca3af; margin:0;">หม่าล่าหน้าแดง — กรุณาเข้าสู่ระบบ</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:1rem;">
      <div>
        <label style="display:block; font-size:0.875rem; font-weight:500; color:#374151; margin-bottom:0.5rem;">Username</label>
        <input type="text" id="login-username" class="login-input" placeholder="กรอก username" autocomplete="username"
          onkeydown="if(event.key==='Enter') document.getElementById('login-password').focus()">
      </div>
      <div>
        <label style="display:block; font-size:0.875rem; font-weight:500; color:#374151; margin-bottom:0.5rem;">Password</label>
        <input type="password" id="login-password" class="login-input" placeholder="กรอก password" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <div id="login-error" style="display:none; background:#fef2f2; border:1px solid #fecaca; border-radius:0.5rem; padding:0.75rem 1rem; color:#dc2626; font-size:0.875rem; text-align:center;"></div>
      <button onclick="doLogin()" id="login-btn" class="login-btn">เข้าสู่ระบบ</button>
    </div>
  </div>
</div>

<!-- ===== หน้าแอปหลัก ===== -->

<!-- Toast -->
<div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl shadow-lg hidden z-50 flex items-center gap-2 text-white text-sm"></div>

<!-- Loading -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center">

    <div class="spinner mx-auto mb-3"></div>
    <p id="loading-text" class="text-gray-700 font-medium">กำลังบันทึก...</p>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzerQR86rlpmJ6O0H6blxG8aw9y3g0V11m6qBD8dGo9kZymJZ_1hrxrCx4PGhwsmSMvDw/exec';

// ============================================================
// AUTH
// ============================================================
function getAuthToken()  { return sessionStorage.getItem('ord_auth_token');  }
function getAuthName()   { return sessionStorage.getItem('ord_auth_name');   }
function getAuthBranch() { return sessionStorage.getItem('ord_auth_branch'); }

function showLoginPage() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function showApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  document.getElementById('req-name').value = getAuthName();
  document.getElementById('req-date').value = new Date().toISOString().split('T')[0];
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  errEl.style.display = 'none';

  if (!username || !password) {
    errEl.textContent = 'กรุณากรอก Username และ Password';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span> กำลังตรวจสอบ...';

  try {
    const res  = await fetch(SHEETS_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await res.json();

    if (data.success) {
      sessionStorage.setItem('ord_auth_token',  data.token);
      sessionStorage.setItem('ord_auth_name',   data.name);
      sessionStorage.setItem('ord_auth_branch', data.branch);
      showApp();
    } else {
      errEl.textContent = data.message || 'Login ไม่สำเร็จ';
      errEl.style.display = 'block';
      document.getElementById('login-password').value = '';
    }
  } catch(e) {
    errEl.textContent = 'เชื่อมต่อ Server ไม่ได้ กรุณาลองใหม่';
    errEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.innerHTML = 'เข้าสู่ระบบ';
}

function doLogout() {
  const token = getAuthToken();
  sessionStorage.removeItem('ord_auth_token');
  sessionStorage.removeItem('ord_auth_name');
  sessionStorage.removeItem('ord_auth_branch');
  fetch(SHEETS_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'logout', token })
  }).catch(() => {});
  showLoginPage();
}

(function initAuth() {
  if (getAuthToken()) showApp();
  else showLoginPage();
})();

// DATA
// ============================================================
const freshItems = [

  { name:'วุ้นเส้นหม่าล่า',        unit:'อัน'  }, { name:'บะหมี่',                 unit:'อัน'  },
  { name:'สาหร่าย',                unit:'อัน'  }, { name:'ฟองเต้าหู้',             unit:'อัน'  },
  { name:'น้ำจิ้มสุกี้',           unit:'งา'   }, { name:'น้ำจิ้มงา purefood',     unit:'งา'   },
  { name:'น้ำจิ้มงา HaiDiLao',    unit:'งา'   }, { name:'ถ้วย 2 ออน',            unit:'แพ็ค' },

  { name:'มาม่าเผ็ดเหลือง',       unit:'อัน'  }, { name:'มาม่าเผ็ดดำ',           unit:'อัน'  },

  { name:'ผักกาดขาว',    unit:'กิโลกรัม' }, { name:'เห็ดเข็มทอง',  unit:'กิโลกรัม' },

  { name:'ข้าวโพด',      unit:'กิโลกรัม' }, { name:'กะหล่ำ',       unit:'กิโลกรัม' },
  { name:'น้ำดำ',        unit:'ถุง'       }, { name:'น้ำกระดูกหมู', unit:'ถุง'       },
  { name:'นม',           unit:'กล่อง'     }

// ============================================================
// RENDER (checkbox style)
// ============================================================
function renderList(containerId, items, prefix, accentColor) {
  const container = document.getElementById(containerId);
  container.innerHTML = items.map((item, i) => `
    <div class="item-row rounded-xl border border-gray-100 overflow-hidden">
      <label class="flex items-center gap-3 p-3 cursor-pointer select-none">
        <input type="checkbox" id="${prefix}-chk-${i}"
          class="w-5 h-5 rounded accent-${accentColor} shrink-0"
          onchange="toggleItem('${prefix}',${i})">
        <span class="flex-1 font-medium text-gray-700">${item.name}</span>
        <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${item.unit}</span>
      </label>
      <div id="${prefix}-fields-${i}" class="item-fields grid-cols-2 gap-2 px-3 pb-3 pt-1 bg-gray-50">
        <div>
          <label class="block text-xs text-gray-500 mb-1">จำนวน</label>
          <input type="number" min="0" step="0.01" id="${prefix}-qty-${i}"
            class="w-full p-2 border-2 border-gray-200 rounded-lg text-center focus:border-red-400 focus:outline-none text-sm"
            placeholder="0">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">หมายเหตุ</label>
          <input type="text" id="${prefix}-note-${i}"
            class="w-full p-2 border border-gray-200 rounded-lg text-sm focus:border-red-400 focus:outline-none"
            placeholder="หมายเหตุ (ถ้ามี)">
        </div>
      </div>
    </div>`).join('');
}

function toggleItem(prefix, i) {
  const checked = document.getElementById(`${prefix}-chk-${i}`).checked;
  const fields  = document.getElementById(`${prefix}-fields-${i}`);
  if (checked) {
    fields.classList.add('open');
    document.getElementById(`${prefix}-qty-${i}`).focus();
  } else {
    fields.classList.remove('open');
    document.getElementById(`${prefix}-qty-${i}`).value  = '';
    document.getElementById(`${prefix}-note-${i}`).value = '';
  }
}

function initLists() {
  renderList('fresh-list', freshItems, 'fresh', 'red-500');
  renderList('stick-list', stickItems, 'stick', 'orange-500');
  renderList('dry-list',   dryItems,   'dry',   'yellow-500');
  renderList('veg-list',   vegItems,   'veg',   'emerald-500');
}
initLists();

// ============================================================
// COLLECT
// ============================================================
function collectSection(items, prefix) {
  return items
    .map((item, i) => ({
      name: item.name,
      unit: item.unit,
      qty:  document.getElementById(`${prefix}-qty-${i}`)?.value  || '',
      note: document.getElementById(`${prefix}-note-${i}`)?.value || '',
      checked: document.getElementById(`${prefix}-chk-${i}`)?.checked || false
    }))
    .filter(i => i.checked);
}

// ============================================================
// VALIDATE
// ============================================================
function validateForm() {
  const date = document.getElementById('req-date').value;
  const name = document.getElementById('req-name').value.trim();

  if (!date) {
    showToast('⚠️ กรุณาเลือกวันที่สั่ง', 'warn');
    return null;
  }
  if (!name) {
    showToast('⚠️ ไม่พบชื่อผู้สั่ง กรุณา Login ใหม่', 'warn');
    return null;
  }

  return {
    date, name,
    note:  document.getElementById('req-note').value.trim(),
    fresh: collectSection(freshItems, 'fresh'),
    stick: collectSection(stickItems, 'stick'),
    dry:   collectSection(dryItems,   'dry'),
    veg:   collectSection(vegItems,   'veg'),
  };
}

// ============================================================
// SAVE
// ============================================================
async function saveToSheets() {
  const d = validateForm();
  if (!d) return;

  const allItems = [...d.fresh, ...d.stick, ...d.dry, ...d.veg];
  if (!allItems.length) {
    showToast('⚠️ กรุณาเลือกรายการที่ต้องการสั่งอย่างน้อย 1 รายการ', 'warn');
    return;
  }

  const missing = allItems.filter(i => !i.qty || parseFloat(i.qty) <= 0);
  if (missing.length) {
    showToast(`⚠️ กรุณากรอกจำนวนของ "${missing[0].name}"`, 'warn');
    return;
  }

  const token = getAuthToken();
  if (!token) { doLogout(); return; }

  showLoading(true, 'กำลังบันทึกลง Google Sheets...');
  try {
    const body = {
      type:    'order',
      token,
      checker: d.name,
      branch:  getAuthBranch() || '',
      payload: {
        date:  d.date,
        note:  d.note,
        items: allItems.map(i => ({ name: i.name, qty: i.qty, unit: i.unit, note: i.note }))
      }
    };

    const res  = await fetch(SHEETS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify(body)
    });
    const json = await res.json();

    if (json.code === 401) {
      doLogout();
      throw new Error('Session หมดอายุ กรุณา Login ใหม่');
    }

    if (json.success) {
      showToast('✅ บันทึกลง Google Sheets สำเร็จ!', 'success');
      setTimeout(() => clearAll(true), 1500);
    } else {
      throw new Error(json.error || json.message || 'Unknown error');
    }
  } catch(e) {
    showToast('❌ บันทึกไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    showLoading(false);
  }
}

// ============================================================
// CLEAR
// ============================================================
function clearAll(silent = false) {
  if (!silent && !confirm('ล้างข้อมูลทั้งหมดหรือไม่?')) return;
  document.getElementById('req-note').value = '';
  document.getElementById('req-date').value = new Date().toISOString().split('T')[0];

  [['fresh',freshItems],['stick',stickItems],['dry',dryItems],['veg',vegItems]]
    .forEach(([prefix, items]) => {
      items.forEach((_, i) => {
        const chk = document.getElementById(`${prefix}-chk-${i}`);
        const qty = document.getElementById(`${prefix}-qty-${i}`);
        const note = document.getElementById(`${prefix}-note-${i}`);
        const fields = document.getElementById(`${prefix}-fields-${i}`);
        if (chk)    chk.checked  = false;
        if (qty)    qty.value    = '';
        if (note)   note.value   = '';
        if (fields) fields.classList.remove('open');
      });
    });

  if (!silent) showToast('✅ ล้างข้อมูลแล้ว', 'success');
}

// ============================================================
// HELPERS
// ============================================================
function showLoading(show, text='กำลังบันทึก...') {
  document.getElementById('loading-overlay').classList.toggle('hidden', !show);
  document.getElementById('loading-text').textContent = text;
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl shadow-lg z-50 flex items-center gap-2 text-white text-sm';
  if (type==='success') t.classList.add('bg-green-600');
  else if (type==='warn') t.classList.add('bg-yellow-500');
  else t.classList.add('bg-red-600');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.add('hidden'), 3500);
}
</script>
